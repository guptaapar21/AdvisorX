name: CoinDCX AI Trading Agent (advisory only)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run agent reasoning cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          COINDCX_API_KEY: ${{ secrets.COINDCX_API_KEY }}
          COINDCX_API_SECRET: ${{ secrets.COINDCX_API_SECRET }}
        run: node agentIndex.js

      - name: Persist advisories and key rotation state
        run: |
          git config user.name "coindcx-agent-bot"
          git config user.email "actions@github.com"
          for f in advisories.json geminiKeyState.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "Update agent state [skip ci]"
          git push
