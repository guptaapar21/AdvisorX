name: CoinDCX AI Trading Agent (advisory only)

on:
  workflow_dispatch: {}
  # No `schedule:` trigger here anymore - GitHub's own cron is best-effort
  # and can slip by 5-30+ minutes under load. Triggering is now handled by
  # an external scheduler (see README) that calls this workflow's
  # workflow_dispatch via the GitHub API on a real schedule instead.
  # Removing the built-in schedule also avoids two overlapping runs both
  # trying to commit the same state files at once.

permissions:
  contents: write # needed so the workflow can commit advisories.json / geminiKeyState.json

# Prevents two runs of this workflow from ever executing at the same time.
# Without this, a 5-minute external trigger can start a new run before the
# previous one has finished committing its state (idleThrottleState.json,
# advisories.json, etc.) - both runs read the same "last state" before
# either has pushed, whichever commits second gets rejected, and that
# run's update is silently lost. This queues runs instead: if one is still
# in progress when the next trigger fires, the new one waits its turn
# rather than racing.
concurrency:
  group: coindcx-agent
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run agent reasoning cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          COINDCX_API_KEY: ${{ secrets.COINDCX_API_KEY }}
          COINDCX_API_SECRET: ${{ secrets.COINDCX_API_SECRET }}
        run: node agentIndex.js

      - name: Persist advisories and key rotation state
        run: |
          git config user.name "coindcx-agent-bot"
          git config user.email "actions@github.com"
          for f in advisories.json geminiKeyState.json trendScoreHistory.json tradeOutcomeLog.json runtimeConfig.json idleThrottleState.json latestScores.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet && exit 0
          git commit -m "Update agent state [skip ci]"
          # Retry the push a few times with a rebase in between, in case
          # something else updated the branch between checkout and here -
          # belt-and-suspenders alongside the concurrency group above.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i), pulling and retrying..."
            git pull --rebase
          done
          echo "Failed to push state after 3 attempts."
          exit 1
